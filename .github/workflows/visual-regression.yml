name: Visual Regression Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded PR runs; queue pushes to main
concurrency:
  group: "visual-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write

jobs:
  visual-tests:
    name: Run Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # All actions SHA-pinned to prevent supply chain tag-mutation attacks
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Check for baseline screenshots
        id: baselines
        run: |
          if find e2e -name "*.png" 2>/dev/null | grep -q .; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
            echo "::notice::No baseline screenshots found. Run 'npx playwright test --update-snapshots' locally and commit the screenshots."
          fi

      - name: Run Playwright visual tests
        if: steps.baselines.outputs.exist == 'true'
        run: npx playwright test
        env:
          CI: true

      - name: Skip visual tests (no baselines)
        if: steps.baselines.outputs.exist == 'false'
        run: echo "Skipping visual regression tests - no baseline screenshots committed yet"

      - name: Upload test results
        if: always() && steps.baselines.outputs.exist == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload visual diff artifacts
        if: failure() && steps.baselines.outputs.exist == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: visual-diffs
          path: |
            e2e/**/*-diff.png
            e2e/**/*-actual.png
          retention-days: 7

      # Expression injection fix: use intermediate env var instead of direct ${{ }} interpolation in script body
      - name: Comment PR with visual changes
        if: github.event_name == 'pull_request' && failure() && steps.baselines.outputs.exist == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ **Visual regression tests failed!**\n\nVisual differences detected. Please review the uploaded artifacts to see the changes.\n\n[View test report](${process.env.RUN_URL})`
            })
